name: Windows release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag, for example v1.0.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    env:
      QT_QPA_PLATFORM: offscreen
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run test suite
        shell: pwsh
        run: python -m pytest

      - name: Build application
        shell: pwsh
        run: pyinstaller --clean --noconfirm opentrace.spec

      - name: Create release archive and checksum
        shell: pwsh
        run: |
          $version = $env:RELEASE_TAG.TrimStart('v')
          $archive = "OpenTrace-$version-Windows-x64.zip"
          Compress-Archive -Path "dist\OpenTrace\*" -DestinationPath $archive -CompressionLevel Optimal
          $hash = (Get-FileHash -LiteralPath $archive -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $archive" | Set-Content -LiteralPath SHA256SUMS.txt -Encoding ascii

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $version = $env:RELEASE_TAG.TrimStart('v')
          $archive = "OpenTrace-$version-Windows-x64.zip"
          $notes = @"
          ## OpenTrace $version

          This maintenance release completes English translations across relationship
          dialogs and labels, note and image creation dialogs, OSINT tool controls,
          note-panel guidance, and interface hover tooltips.

          ### Download

          Download ``$archive``, extract the complete directory, and run ``OpenTrace.exe``.

          Windows SmartScreen may display a warning because this community build is not code-signed.

          ### Integrity

          Verify the downloaded archive against ``SHA256SUMS.txt``.
          "@
          $notes | Set-Content -LiteralPath release-notes.md -Encoding utf8
          gh release create $env:RELEASE_TAG $archive SHA256SUMS.txt `
            --title "OpenTrace $version" `
            --notes-file release-notes.md `
            --verify-tag
